name: Scrape IFPA & Update Site Data

on:
  # schedule:
  #   - cron: "0 */12 * * *"   # Every 12 hours — paused, running scraper locally for now
  workflow_dispatch:           # Allow manual runs from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python Scraper-with-Times.py

      - name: Commit updated site data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site_data/
          git diff --cached --quiet || git commit -m "chore: auto-update site data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
